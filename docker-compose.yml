# JARVIS stack — runs on the UGREEN NAS (UGOS Pro → Docker → Compose).
# See docs/nas-setup.md for the step-by-step. All services reachable only
# over Tailscale; do NOT port-forward any of this to the internet.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST}:5678/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      # Let workflows read these via {{ $env.X }} expressions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SAM_API_KEY: ${SAM_API_KEY}
      HQ_URL: ${HQ_URL}
      HQ_TOKEN: ${HQ_TOKEN}
    volumes:
      - ./volumes/n8n:/home/node/.n8n
      # Drop voice memos here (synced folder / SMB share) for the Whisper pipeline
      - ./volumes/voice-inbox:/data/voice-inbox

  hq:
    build: ./hq
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      HQ_PORT: 8099
      HQ_TOKEN: ${HQ_TOKEN}
      DATA_DIR: /data
    volumes:
      - ./volumes/hq:/data

  # Control-plane spine: append-only event store + spend gate + KPIs + Chief-of-Staff router.
  # Build context is the repo root so the image can include ../pods (router target).
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      CONTROL_PLANE_PORT: 8787
      SPEND_ACTION_CAP_USD: ${SPEND_ACTION_CAP_USD:-2}
      SPEND_DAILY_CAP_USD: ${SPEND_DAILY_CAP_USD:-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      COS_MODEL: ${COS_MODEL:-claude-haiku-4-5}
      MODEL_CHEAP: ${MODEL_CHEAP:-claude-haiku-4-5}
      MODEL_DRAFT: ${MODEL_DRAFT:-claude-haiku-4-5}
      MODEL_REFLECT: ${MODEL_REFLECT:-claude-haiku-4-5}
      HQ_URL: http://hq:8099
      HQ_TOKEN: ${HQ_TOKEN}
      # the control-plane process runs the pod workers when commands route — give them their keys
      SAM_API_KEY: ${SAM_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      FAL_KEY: ${FAL_KEY}
      MEDIA_PROVIDER: ${MEDIA_PROVIDER}
      MEDIA_BUDGET_USD: ${MEDIA_BUDGET_USD:-10}
      # Gov pod (Hector): discovery + Rodgate inbox reading + award push alerts
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      RODGATE_GMAIL_USER: ${RODGATE_GMAIL_USER}
      RODGATE_GMAIL_APP_PASSWORD: ${RODGATE_GMAIL_APP_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Notion "Company Brain" sync (opportunities / subs / daily log / lessons). Without this the
      # gov worker scores fine but every Notion write silently skips ("no NOTION_API_KEY").
      NOTION_API_KEY: ${NOTION_API_KEY}
      # CRM + awards live on a mounted volume so they persist + you can open them on the NAS
      GOV_DATA_DIR: /app/control-plane/data/gov-crm
    volumes:
      - ./volumes/control-plane:/app/control-plane/data   # event store + gov CRM (./volumes/control-plane/gov-crm/)
      - ./volumes/gov-drafts:/app/gov-drafts        # proposal + outreach drafts (HITL review)
      - ./volumes/fiverr-assets:/app/fiverr-assets   # produced deliverables

  # ── RETIRED: jarvis-world ──────────────────────────────────────────────────────────────────────
  # The standalone React/Vite "World" PWA is retired — its floor view is folded into the companion
  # (companion/, the ONE app, which runs on the PC and reads the control-plane + HQ directly over LAN).
  # Its Vite build HANGS on the NAS's slow HDD, so it must NOT be in the deploy/build path. Kept here
  # commented for history; re-enable only if you ever want the NAS to serve a browser floor again.
  # jarvis-world:
  #   build: ./jarvis-world
  #   restart: unless-stopped
  #   depends_on:
  #     - hq
  #     - control-plane
  #   ports:
  #     - "8095:80"

  # Conservative scheduler — same image as the control-plane, command overridden to run the cron loop.
  # Wakes agents only inside working hours; idle polls rest (zero tokens). Posts /command to the spine.
  scheduler:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    restart: unless-stopped
    depends_on:
      - control-plane
      - hq
    command: ["node", "control-plane/scheduler.mjs"]
    environment:
      CONTROL_PLANE_URL: http://control-plane:8787
      HQ_URL: http://hq:8099
      HQ_TOKEN: ${HQ_TOKEN}
      SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-900000}
      JOB_CHECK_URL: ${JOB_CHECK_URL}

  # Telegram bridge — runs 24/7 ON THE NAS so the agent activity feed + approve-from-phone reach your
  # phone even with your PC off (the point of it while you travel). Talks to the control-plane for
  # approvals + the event feed; free-text falls back to the CoS router (no companion needed on the NAS).
  telegram-bridge:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    restart: unless-stopped
    depends_on:
      - control-plane
    command: ["node", "companion/telegram-bridge.mjs"]
    environment:
      JARVIS_CP_URL: http://control-plane:8787
      COMPANION_URL: http://control-plane:8787   # no companion on the NAS → chat falls back to /command
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

  # --- Langfuse (OPTIONAL visual tracing, doctrine §11) — see docs/langfuse.md ---------------------
  # Uncomment to add visual tracing. It reuses the existing `postgres` service (create the DB first:
  #   docker compose exec postgres createdb -U ${POSTGRES_USER:-jarvis} langfuse ).
  # Then set LANGFUSE_HOST/PUBLIC_KEY/SECRET_KEY in .env so the control-plane mirrors events here.
  # langfuse:
  #   image: langfuse/langfuse:latest
  #   restart: unless-stopped
  #   depends_on: [postgres]
  #   ports: ["3000:3000"]
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
  #     NEXTAUTH_URL: http://localhost:3000
  #     NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me}
  #     SALT: ${LANGFUSE_SALT:-change-me}

  # Local, private voice transcription. POST multipart audio_file → /asr?output=json
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: small        # N100-class NAS CPUs handle "small" fine; use "base" if slow
      ASR_ENGINE: faster_whisper
    volumes:
      - ./volumes/whisper-cache:/root/.cache

  # Tailscale as a container (host networking). This brings the tailnet interface
  # up ON the host, so the published container ports above (5678, 8099, 9000) become
  # reachable across your tailnet at  http://<hostname>:<port>  — nothing public.
  # ALTERNATIVE: install Tailscale from the UGREEN App Center instead and skip this
  # service entirely. Pick ONE. See docs/nas-setup.md.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: jarvis-tailscale
    hostname: jarvis-nas              # becomes the MagicDNS name → http://jarvis-nas:8099
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # --accept-dns=false avoids the known UGOS port-53 / DNS fight (plan §11)
      TS_EXTRA_ARGS: "--accept-dns=false"
    volumes:
      - ./volumes/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
