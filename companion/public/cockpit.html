<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JARVIS · Cockpit</title>
  <link rel="stylesheet" href="cockpit.css" />
</head>
<body>
  <!-- thin approvals strip (only appears when something is waiting on you) -->
  <div id="approvals" class="approvals hidden" aria-live="polite"></div>

  <main class="cockpit">
    <header class="top">
      <div>
        <h1 id="greeting">Good day.</h1>
        <p id="subtitle" class="muted">Loading your day…</p>
      </div>
      <div class="top-right">
        <span id="clock" class="clock"></span>
        <button id="refresh" class="ghost" title="Refresh">↻</button>
      </div>
    </header>

    <!-- 🎯 TODAY — the one thing -->
    <section class="hero card">
      <div class="hero-label">🎯 The one thing</div>
      <div id="oneThing" class="one-thing">—</div>
      <div id="oneMeta" class="one-meta"></div>
      <div id="todayCal" class="today-cal"></div>
    </section>

    <div class="grid">
      <!-- ✅ TASKS -->
      <section class="card tasks">
        <div class="card-head">
          <h2>✅ Tasks</h2>
          <span id="taskCount" class="pill"></span>
        </div>
        <form id="addForm" class="quick-add">
          <input id="addInput" type="text" placeholder="Add a task…  (#gov 📅 2026-07-01)" autocomplete="off" />
          <button type="submit" class="accent">Add</button>
        </form>
        <div id="dueWrap">
          <div class="section-label">🔥 Today &amp; overdue</div>
          <ul id="dueList" class="task-list"></ul>
        </div>
        <div id="activeWrap">
          <div class="section-label">⚡ Active</div>
          <ul id="activeList" class="task-list"></ul>
        </div>
      </section>

      <!-- 📅 WEEK -->
      <section class="card week">
        <div class="card-head">
          <h2>📅 Week</h2>
          <span id="calStatus" class="pill"></span>
        </div>
        <div id="weekList" class="week-list"></div>
      </section>
    </div>

    <!-- ⚡ CAPTURE -->
    <section class="card capture">
      <div class="card-head"><h2>⚡ Capture</h2><span class="muted small">→ ⚡ Quick Capture.md</span></div>
      <form id="captureForm" class="capture-box">
        <input id="captureInput" type="text" placeholder="Dump a thought — it lands in the vault…" autocomplete="off" />
        <button type="submit" class="accent">Capture</button>
      </form>
      <div id="captureToast" class="toast"></div>
    </section>

    <footer class="foot muted small">
      <a href="/index.html">Companion</a> · <a href="/cockpit.html">Cockpit</a> · vault-backed · gated 5% routes to you
    </footer>
  </main>

  <script src="cockpit.js"></script>
</body>
</html>
