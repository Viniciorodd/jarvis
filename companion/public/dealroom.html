<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d12">
<title>Deal Room · Rodgate, LLC</title>
<style>
  /* ── The private-bank aesthetic: charcoal, champagne, hairlines, serif display ─────────────── */
  :root {
    --bg: #0a0d12; --panel: #10141b; --panel2: #141924; --line: rgba(255,255,255,.07);
    --ink: #e8e4da; --dim: #8a8fa0; --faint: #565b6b;
    --gold: #c9a862; --gold-dim: rgba(201,168,98,.14);
    --green: #6fbf8f; --red: #d98a7e; --blue: #7ea6d9;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--ink); font: 15px/1.55 var(--sans); -webkit-font-smoothing: antialiased; padding-bottom: 60px; }
  a { color: inherit; }

  header { padding: 26px 22px 18px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #0d1119, var(--bg)); }
  .crown { display:flex; align-items: baseline; justify-content: space-between; max-width: 1180px; margin: 0 auto; flex-wrap: wrap; gap: 6px; }
  h1 { font: 400 30px/1.15 var(--serif); letter-spacing: .4px; }
  h1 em { font-style: normal; color: var(--gold); }
  .date { color: var(--dim); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin: 18px auto 0; max-width: 1180px; }
  .kpi { background: var(--panel); padding: 14px 18px; }
  .kpi b { display: block; font: 400 24px/1.2 var(--serif); color: var(--ink); }
  .kpi b.gold { color: var(--gold); }
  .kpi b.warn { color: var(--red); }
  .kpi span { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); }

  main { max-width: 1180px; margin: 0 auto; padding: 22px; }
  section { margin-bottom: 30px; }
  .sect { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .sect h2 { font: 400 19px var(--serif); letter-spacing: .3px; }
  .sect .n { color: var(--gold); font: 400 19px var(--serif); }
  .sect small { color: var(--faint); font-size: 12px; }

  /* the line — the linear middleman pipeline, always visible */
  .rail { display: flex; gap: 0; overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  .rail .st { flex: 1; min-width: 92px; padding: 12px 10px 10px; text-align: center; border-right: 1px solid var(--line); position: relative; }
  .rail .st:last-child { border-right: 0; }
  .rail .st b { display: block; font: 400 20px var(--serif); color: var(--ink); }
  .rail .st.zero b { color: var(--faint); }
  .rail .st span { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); white-space: nowrap; }
  .rail .st.hot b { color: var(--gold); }

  /* your move — the queue that must never be ambiguous */
  .move-card { border: 1px solid rgba(201,168,98,.35); background: linear-gradient(180deg, rgba(201,168,98,.07), transparent); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; gap: 14px; align-items: center; flex-wrap: wrap; }
  .move-card .t { font: 400 17px var(--serif); }
  .move-card .a { color: var(--gold); font-size: 13.5px; margin-top: 2px; }
  .move-card .dl { font-size: 12px; color: var(--dim); white-space: nowrap; }
  .move-card .dl b { color: var(--red); font-weight: 600; }
  .calm { color: var(--dim); border: 1px dashed var(--line); border-radius: 12px; padding: 18px; text-align: center; font-size: 14px; }

  /* deal cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }
  .deal { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 10px; }
  .deal .top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
  .deal h3 { font: 400 16.5px/1.35 var(--serif); }
  .deal .agency { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
  .chip { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; padding: 4px 9px; border-radius: 99px; border: 1px solid var(--line); color: var(--dim); white-space: nowrap; }
  .chip.you { border-color: rgba(201,168,98,.5); color: var(--gold); background: var(--gold-dim); }
  .chip.sub { border-color: rgba(126,166,217,.4); color: var(--blue); }
  .chip.agency-chip { border-color: rgba(111,191,143,.4); color: var(--green); }
  .money { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 9px 0; display: flex; gap: 18px; }
  .money div b { display: block; font: 400 17px var(--serif); color: var(--gold); }
  .money div span { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); }
  .steps { display: flex; flex-wrap: wrap; gap: 6px 12px; }
  .step { font-size: 12px; color: var(--faint); }
  .step.done { color: var(--green); }
  .step.gap { color: var(--red); }
  .deal .foot { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }
  .deal .foot .move { color: var(--ink); font-size: 12.5px; }
  .deal .foot .move.you { color: var(--gold); }
  .empty { text-align: center; padding: 70px 20px; color: var(--dim); }
  .empty h3 { font: 400 22px var(--serif); color: var(--ink); margin-bottom: 8px; }
  .home { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: var(--panel2); border: 1px solid var(--line); border-radius: 99px; padding: 8px 22px; font-size: 13px; color: var(--dim); text-decoration: none; }
  @media (max-width: 640px) { h1 { font-size: 24px; } main { padding: 16px; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div class="crown">
    <h1>Deal Room <em>·</em> Rodgate, LLC</h1>
    <div class="date" id="today"></div>
  </div>
  <div class="kpis" id="kpis"></div>
</header>

<main>
  <section>
    <div class="sect"><h2>Your move</h2><span class="n" id="nyou"></span><small>nothing here means nothing is waiting on you</small></div>
    <div id="yourmove"></div>
  </section>

  <section>
    <div class="sect"><h2>The line</h2><small>every deal walks this exact path — no more “in the air”</small></div>
    <div class="rail" id="rail"></div>
  </section>

  <section>
    <div class="sect"><h2>Deals</h2><span class="n" id="ndeals"></span></div>
    <div class="grid" id="deals"></div>
    <div id="none"></div>
  </section>
</main>
<a class="home" href="/">← Jarvis</a>

<script>
const $ = (id) => document.getElementById(id);
const fmt$ = (n) => '$' + Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const daysLeft = (d) => { if (!d) return null; const x = new Date(d); if (isNaN(x)) return null; return Math.ceil((x - Date.now()) / 864e5); };
const dlText = (d) => { const n = daysLeft(d); if (n == null) return ''; if (n < 0) return 'deadline passed'; if (n === 0) return '<b>due TODAY</b>'; if (n <= 7) return '<b>' + n + 'd</b> to deadline'; return n + 'd to deadline'; };

const STAGES = ['scouted','scored','sow_pulled','outreach_drafted','outreach_sent','quotes_in','priced','proposal_ready','submitted','closed'];
const SHORT = { scouted:'Scouted', scored:'Scored', sow_pulled:'SOW', outreach_drafted:'Outreach', outreach_sent:'Sent', quotes_in:'Quotes', priced:'Priced', proposal_ready:'Proposal', submitted:'Submitted', closed:'Closed' };
const MOVCHIP = { you: ['you','YOUR MOVE'], sub: ['sub','AWAITING SUB'], agency: ['agency-chip','AT THE AGENCY'], jarvis: ['', 'JARVIS WORKING'] };

function stepRow(d) {
  const has = (k) => !(d.gaps || []).some((g) => g.key === k || (k === 'outreach' && g.key === 'outreach_sent'));
  const sent = (d.outreach || []).some((o) => o.sentAt);
  const items = [
    ['SOW', d.sow && d.sow.pulled],
    ['Outreach', (d.outreach || []).length > 0],
    ['Sent', sent],
    ['Quotes ' + ((d.quotes || []).length || ''), (d.quotes || []).length > 0],
    ['Priced', !!d.pricing],
    ['Proposal', !!d.proposalFile],
  ];
  if (d.subNeeded === false) items.splice(1, 4);
  return items.map(([label, ok]) => `<span class="step ${ok ? 'done' : 'gap'}">${ok ? '✓' : '○'} ${esc(label)}</span>`).join('');
}

function render(b) {
  $('today').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const open = (b.deals || []).filter((d) => d.stage !== 'closed');
  $('kpis').innerHTML = `
    <div class="kpi"><b class="gold">${fmt$(b.pipeline)}</b><span>Pipeline (bids)</span></div>
    <div class="kpi"><b class="gold">${fmt$(b.profit)}</b><span>Projected profit</span></div>
    <div class="kpi"><b class="${b.needsYou ? 'warn' : ''}">${b.needsYou || 0}</b><span>Waiting on you</span></div>
    <div class="kpi"><b>${open.length}</b><span>Open deals</span></div>`;

  $('rail').innerHTML = STAGES.map((s) => {
    const n = (b.counts && b.counts[s]) || 0;
    return `<div class="st ${n ? '' : 'zero'} ${(s === 'priced' || s === 'proposal_ready') && n ? 'hot' : ''}"><b>${n}</b><span>${SHORT[s]}</span></div>`;
  }).join('');

  const yours = (b.deals || []).filter((d) => d.move && d.move.who === 'you' && d.stage !== 'closed');
  $('nyou').textContent = yours.length || '';
  $('yourmove').innerHTML = yours.length ? yours.slice(0, 6).map((d) => `
    <div class="move-card">
      <div><div class="t">${esc(d.title || d.noticeId)}</div><div class="a">→ ${esc(d.move.text)}</div></div>
      <div class="dl">${dlText(d.deadline)}</div>
    </div>`).join('')
    : '<div class="calm">Nothing is waiting on you. Jarvis and the subs have the ball.</div>';

  const deals = (b.deals || []);
  $('ndeals').textContent = deals.length || '';
  $('none').innerHTML = deals.length ? '' : `<div class="empty"><h3>The ledger is empty</h3>The next SAM scan files every scored opportunity here —<br>with its scope of work, outreach, quotes, price and gaps, on one line.</div>`;
  $('deals').innerHTML = deals.map((d) => {
    const [cls, label] = MOVCHIP[(d.move && d.move.who) || 'jarvis'] || MOVCHIP.jarvis;
    const price = d.pricing ? `
      <div class="money">
        <div><b>${fmt$(d.pricing.bid)}${d.pricing.period && d.pricing.period !== 'total' ? '<small>/' + { month: 'mo', year: 'yr', hour: 'hr' }[d.pricing.period] + '</small>' : ''}</b><span>Our bid</span></div>
        <div><b>${fmt$(d.pricing.profit)}</b><span>Profit (${d.pricing.markupPct}%)</span></div>
        <div><b>${fmt$(d.pricing.subQuote)}</b><span>Sub quote</span></div>
      </div>` : '';
    return `
    <div class="deal">
      <div class="top">
        <div><h3>${d.url ? `<a href="${esc(d.url)}" target="_blank" rel="noopener" style="text-decoration:none">${esc(d.title || d.noticeId)}</a>` : esc(d.title || d.noticeId)}</h3>
        <div class="agency">${esc(d.agency || '')}${d.place ? ' · ' + esc(d.place) : ''}${d.score ? ' · fit ' + d.score + '/100' : ''}</div></div>
        <span class="chip ${cls}">${label}</span>
      </div>
      ${price}
      <div class="steps">${stepRow(d)}</div>
      <div class="foot">
        <span class="move ${(d.move && d.move.who) === 'you' ? 'you' : ''}">${esc((d.move && d.move.text) || '')}</span>
        <span>${dlText(d.deadline)}</span>
      </div>
    </div>`;
  }).join('');
}

async function load() {
  try { const r = await fetch('/api/deals', { cache: 'no-store' }); render(await r.json()); }
  catch { $('none').innerHTML = '<div class="empty"><h3>Deal Room offline</h3>Could not reach the ledger — is the companion server up?</div>'; }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
