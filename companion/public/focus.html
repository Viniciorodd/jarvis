<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🌳 Focus — Jarvis</title>
<script>try{var _t=localStorage.getItem('jarvis-theme');document.documentElement.dataset.theme=(!_t||_t==='exec')?'black':_t;}catch(e){document.documentElement.dataset.theme='black';}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ margin:0; background:var(--ink); color:var(--cream); font-family:var(--font,'Inter',system-ui,sans-serif); -webkit-font-smoothing:antialiased; letter-spacing:-.011em; overflow-x:hidden; }
  .wrap{ max-width:820px; margin:0 auto; padding:18px 16px calc(28px + env(safe-area-inset-bottom,0)); }
  .top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  h1{ font-size:22px; font-weight:800; margin:0; letter-spacing:-.01em; }
  .back{ font-size:13px; color:var(--teal); text-decoration:none; }
  .sub{ color:var(--dim); font-size:13px; margin:4px 0 16px; }
  .toggle{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .toggle button{ appearance:none; border:1px solid rgba(var(--teal-rgb),.25); background:transparent; color:var(--dim); border-radius:20px; padding:7px 15px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s,color .15s,border-color .15s; }
  .toggle button.on{ background:var(--teal); color:var(--ink-on-accent); border-color:var(--teal); }
  .tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  @media(max-width:460px){ .tiles{ grid-template-columns:repeat(2,1fr); } }
  .tile{ background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:14px; padding:13px 14px; }
  .tile .v{ font-size:22px; font-weight:800; color:var(--teal); letter-spacing:-.02em; }
  .tile .k{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-top:3px; }
  .h2{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:22px 0 10px; }
  .h2row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:22px 0 10px; }
  .h2row .h2{ margin:0; }

  /* Chart card */
  .card{ background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:16px; padding:14px 14px 10px; }
  .ctype{ display:flex; gap:4px; }
  .ctype button{ appearance:none; border:1px solid rgba(var(--teal-rgb),.22); background:transparent; color:var(--dim); border-radius:9px; padding:5px 11px; font:inherit; font-size:12px; font-weight:600; cursor:pointer; }
  .ctype button.on{ background:rgba(var(--teal-rgb),.14); color:var(--teal); border-color:rgba(var(--teal-rgb),.4); }

  .chart{ display:flex; align-items:flex-end; gap:5px; height:220px; overflow-x:auto; padding-bottom:4px; scrollbar-width:thin; }
  .chart.svg{ display:block; }
  .chart::-webkit-scrollbar{ height:5px; } .chart::-webkit-scrollbar-thumb{ background:var(--teal-dim); border-radius:5px; }
  .bw{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
  .bw.tap{ cursor:pointer; }
  .bar{ width:20px; min-height:2px; background:linear-gradient(180deg,var(--teal),var(--teal-dim)); border-radius:5px 5px 0 0; transition:opacity .15s; }
  .bw.tap:hover .bar, .bar:hover{ opacity:.72; }
  .bv{ font-size:9px; color:var(--dim); margin-bottom:3px; }
  .bl{ font-size:9px; color:var(--dim); margin-top:5px; white-space:nowrap; transform:rotate(-30deg); transform-origin:top center; height:22px; }
  .svgscroll{ overflow-x:auto; overflow-y:hidden; scrollbar-width:thin; padding-bottom:2px; }
  .svgscroll::-webkit-scrollbar{ height:5px; } .svgscroll::-webkit-scrollbar-thumb{ background:var(--teal-dim); border-radius:5px; }
  .svgscroll svg, .radarwrap svg{ display:block; }
  .radarwrap{ display:flex; justify-content:center; }
  .chartlegend{ display:flex; gap:16px; justify-content:center; font-size:11px; color:var(--dim); margin-top:8px; }
  .chartlegend i{ display:inline-block; width:16px; height:0; border-top:2px solid var(--teal); vertical-align:middle; margin-right:6px; }
  .chartlegend i.trend{ border-top:2px dashed var(--dim); }

  .tags .row{ display:flex; align-items:center; gap:10px; margin:7px 0; font-size:13px; }
  .tags .name{ flex:0 0 128px; color:var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tags .track{ flex:1; height:16px; background:rgba(var(--teal-rgb),.08); border-radius:8px; overflow:hidden; }
  .tags .fill{ height:100%; background:var(--teal); border-radius:8px; }
  .tags .val{ flex:0 0 auto; color:var(--teal); font-weight:700; font-size:12px; width:56px; text-align:right; }

  /* Timeline */
  .tl{ display:flex; flex-direction:column; }
  .tl .item{ display:flex; gap:12px; padding:11px 4px; border-bottom:0.5px solid var(--line); cursor:pointer; align-items:flex-start; transition:background .12s; border-radius:8px; }
  .tl .item:hover{ background:rgba(var(--teal-rgb),.05); }
  .tl .when{ flex:0 0 92px; }
  .tl .when .d{ font-size:12.5px; font-weight:600; color:var(--cream); }
  .tl .when .t{ font-size:11px; color:var(--dim); margin-top:2px; }
  .tl .body{ flex:1; min-width:0; }
  .tl .line1{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .tl .dur{ font-size:13px; font-weight:700; color:var(--teal); }
  .chip{ font-size:11px; font-weight:600; color:var(--teal); background:rgba(var(--teal-rgb),.12); border:1px solid rgba(var(--teal-rgb),.22); border-radius:20px; padding:2px 9px; white-space:nowrap; }
  .tl .note{ font-size:12.5px; color:var(--dim); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .src{ font-size:11px; color:var(--dim); flex:0 0 auto; }
  .src .si{ font-size:12px; }

  /* Log box */
  .log{ margin-top:24px; background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:14px; padding:14px; }
  .log input{ width:100%; box-sizing:border-box; background:var(--ink2); border:1px solid rgba(var(--teal-rgb),.25); border-radius:10px; color:var(--cream); padding:12px 14px; font:inherit; font-size:15px; }
  .log .hint{ font-size:12px; color:var(--dim); margin-top:8px; line-height:1.4; }
  .empty{ color:var(--dim); font-size:13px; padding:20px 0; }

  /* Day drill-down overlay */
  .ovl{ position:fixed; inset:0; z-index:50; display:none; }
  .ovl.open{ display:block; }
  .ovl .scrim{ position:absolute; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(2px); }
  .ovl .sheet{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(560px,calc(100vw - 28px)); max-height:min(80vh,720px); overflow-y:auto; background:var(--panel); border:1px solid rgba(var(--teal-rgb),.2); border-radius:18px; padding:18px 18px calc(18px + env(safe-area-inset-bottom,0)); box-shadow:0 24px 60px rgba(0,0,0,.5); scrollbar-width:thin; }
  .ovl .sheet::-webkit-scrollbar{ width:6px; } .ovl .sheet::-webkit-scrollbar-thumb{ background:var(--teal-dim); border-radius:6px; }
  .ovl .shead{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .ovl .stitle{ font-size:17px; font-weight:800; color:var(--cream); letter-spacing:-.01em; }
  .ovl .stotal{ font-size:12.5px; color:var(--dim); margin-top:2px; }
  .ovl .x{ appearance:none; border:1px solid rgba(var(--teal-rgb),.25); background:transparent; color:var(--dim); border-radius:10px; width:32px; height:32px; font-size:16px; cursor:pointer; flex:0 0 auto; line-height:1; }
  .ovl .x:hover{ color:var(--teal); border-color:var(--teal); }
  .ds{ display:flex; gap:12px; padding:11px 0; border-bottom:0.5px solid var(--line); align-items:flex-start; }
  .ds:last-child{ border-bottom:none; }
  .ds .dt{ flex:0 0 78px; font-size:12px; font-weight:600; color:var(--cream); }
  .ds .db{ flex:1; min-width:0; }
  .ds .dl1{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ds .ddur{ font-size:13px; font-weight:700; color:var(--teal); }
  .ds .dnote{ font-size:12.5px; color:var(--dim); margin-top:4px; line-height:1.4; }
  .ds .dsrc{ font-size:11px; color:var(--dim); margin-top:4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>🌳 Focus</h1><a class="back" href="/">‹ Jarvis</a></div>
  <div class="sub" id="sub">Loading your time…</div>

  <div class="toggle" id="toggle">
    <button data-g="day">Day</button>
    <button data-g="week">Week</button>
    <button data-g="month" class="on">Month</button>
    <button data-g="quarter">Quarter</button>
    <button data-g="year">Year</button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="h2row">
    <div class="h2">Focus over time</div>
    <div class="ctype" id="ctype">
      <button data-c="bars" class="on">Bars</button>
      <button data-c="line">Line</button>
      <button data-c="radar">Radar</button>
    </div>
  </div>
  <div class="card">
    <div class="chart" id="chart"></div>
    <div id="chartExtra"></div>
  </div>

  <div class="h2">Where the time goes</div>
  <div class="tags" id="tags"></div>

  <div class="h2">Recent</div>
  <div class="tl" id="timeline"></div>

  <div class="log">
    <input id="logIn" placeholder="Log a session — “focused 90 min on gov” or “Jul 13, 2am, 30 min reading”" autocomplete="off">
    <div class="hint" id="logHint">Paste from your notes with a date/time and I’ll log it on that day, not today. Enter to log.</div>
  </div>
</div>

<!-- Day drill-down -->
<div class="ovl" id="ovl">
  <div class="scrim" data-close="1"></div>
  <div class="sheet" id="sheet"></div>
</div>

<script>
var grouping = 'month';
var chartType = 'bars';
var DATA = null;

var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DOWL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function fmtH(mins){ var h=mins/60; return (Math.round(h*10)/10)+'h'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function lbl(b, g){
  if(g==='year') return b;
  if(g==='month'){ var p=b.split('-'); return MON[+p[1]-1]+" '"+p[0].slice(2); }
  if(g==='quarter') return b.replace('-',' ');
  if(g==='week') return b.split('-W')[1] ? "W"+b.split('-W')[1] : b;
  return b.slice(5); // day → MM-DD
}
var MAXBARS = { day:45, week:30, month:36, quarter:24, year:20 };

// ---- date/time helpers ----
function ymdParts(s){ var p=String(s||'').split('-'); return {y:+p[0], m:+p[1], d:+p[2]}; }
function fmtDay(dateStr){ var p=ymdParts(dateStr); if(!p.m) return dateStr||''; return MON[p.m-1]+' '+p.d; }
function fmtTime(iso){
  if(!iso) return '';
  var dt=new Date(iso); if(isNaN(dt)) return '';
  var h=dt.getHours(), mi=dt.getMinutes(), ap=h<12?'AM':'PM';
  var h12=h%12; if(h12===0) h12=12;
  return h12+':'+(mi<10?'0':'')+mi+' '+ap;
}
function fmtDayFull(dateStr){ var p=ymdParts(dateStr); if(!p.m) return dateStr||''; var w=new Date(p.y,p.m-1,p.d).getDay(); return DOWL[w]+', '+MONL[p.m-1]+' '+p.d+', '+p.y; }
function srcMark(src){
  var s=String(src||'').toLowerCase();
  if(s.indexOf('voice')>-1||s.indexOf('speech')>-1) return {i:'🎙', l:'voice'};
  if(s.indexOf('forest')>-1) return {i:'🌲', l:'forest'};
  if(s.indexOf('obsidian')>-1||s.indexOf('vault')>-1||s.indexOf('paste')>-1) return {i:'📝', l:'obsidian'};
  if(s.indexOf('manual')>-1||s.indexOf('type')>-1||s==='') return {i:'✍', l:s?src:'manual'};
  return {i:'•', l:src};
}

// ---- main render ----
function render(d){
  DATA = d;
  document.getElementById('sub').textContent = d.totalHours + ' hours · ' + (d.sessions||0).toLocaleString() + ' sessions · ' + (d.activeDays||0).toLocaleString() + ' active days' + (d.error?(' · '+d.error):'');
  var tiles=[[d.totalHours+'h','Total focus'],[(d.sessions||0).toLocaleString(),'Sessions'],[d.streak,'Day streak'],[(d.activeDays||0).toLocaleString(),'Active days'],[(d.successRate!=null?d.successRate:'—')+'%','Completed'],[d.bestDayOfWeek||'—','Best day']];
  document.getElementById('tiles').innerHTML = tiles.map(function(t){return '<div class="tile"><div class="v">'+esc(t[0])+'</div><div class="k">'+esc(t[1])+'</div></div>';}).join('');

  renderChart();

  var tags=(d.topTags||[]); var tmax=tags.reduce(function(m,t){return Math.max(m,t.minutes);},1);
  document.getElementById('tags').innerHTML = tags.length ? tags.map(function(t){
    return '<div class="row"><div class="name">'+esc(t.tag)+'</div><div class="track"><div class="fill" style="width:'+Math.round(t.minutes/tmax*100)+'%"></div></div><div class="val">'+fmtH(t.minutes)+'</div></div>';
  }).join('') : '<div class="empty">—</div>';

  renderTimeline(d.recent||[]);
}

// ---- charts ----
function renderChart(){
  var chart=document.getElementById('chart');
  var extra=document.getElementById('chartExtra');
  extra.innerHTML='';
  if(chartType==='radar'){ chart.className='chart svg'; renderRadar(chart); return; }
  if(chartType==='line'){ chart.className='chart svg'; renderLine(chart, extra); return; }
  chart.className='chart'; renderBars(chart);
}

function renderBars(chart){
  var d=DATA||{};
  var series=(d.series||[]).slice(-MAXBARS[grouping]);
  var max=series.reduce(function(m,s){return Math.max(m,s.minutes);},1);
  var tappable=(grouping==='day');
  chart.innerHTML = series.length ? series.map(function(s){
    var pct=Math.max(2,Math.round(s.minutes/max*100));
    var tapCls=tappable?' tap':'';
    var datad=tappable?(' data-day="'+esc(s.bucket)+'"'):'';
    return '<div class="bw'+tapCls+'"'+datad+'><div class="bv">'+fmtH(s.minutes)+'</div><div class="bar" style="height:'+pct+'%" title="'+esc(s.bucket)+': '+fmtH(s.minutes)+'"></div><div class="bl">'+esc(lbl(s.bucket,grouping))+'</div></div>';
  }).join('') : '<div class="empty">No sessions in this range yet.</div>';
  chart.scrollLeft = chart.scrollWidth;
}

function movAvg(arr, win){
  var out=[], half=Math.floor(win/2);
  for(var i=0;i<arr.length;i++){
    var a=Math.max(0,i-half), b=Math.min(arr.length-1,i+half), sum=0, n=0;
    for(var j=a;j<=b;j++){ sum+=arr[j]; n++; }
    out.push(n?sum/n:0);
  }
  return out;
}

function renderLine(chart, extra){
  var d=DATA||{};
  var series=(d.series||[]).slice(-MAXBARS[grouping]);
  if(!series.length){ chart.innerHTML='<div class="empty">No sessions in this range yet.</div>'; return; }
  var vals=series.map(function(s){return s.minutes;});
  var max=Math.max.apply(null,vals)||1;
  var win = series.length>=5 ? (series.length>=12?5:3) : 1;
  var trend=movAvg(vals, win);

  var padL=8, padR=8, padT=14, padB=26, H=210;
  var stepX=Math.max(34, Math.min(64, Math.round(560/Math.max(1,series.length-1))));
  var innerW=stepX*(series.length-1);
  var W=innerW+padL+padR;
  var plotH=H-padT-padB, plotY0=padT, plotY1=padT+plotH;
  function X(i){ return padL + (series.length===1? innerW/2 : i*stepX); }
  function Y(v){ return plotY1 - (v/max)*plotH; }

  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" preserveAspectRatio="xMinYMid meet" role="img">';
  // grid: 4 horizontal lines
  var rings=4;
  for(var g=0; g<=rings; g++){
    var gy=plotY0 + (plotH/rings)*g;
    svg+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="var(--line)" stroke-width="1"/>';
  }
  // area path
  var area='M '+X(0).toFixed(1)+' '+plotY1.toFixed(1);
  var line='';
  for(var i=0;i<series.length;i++){
    var px=X(i).toFixed(1), py=Y(vals[i]).toFixed(1);
    area+=' L '+px+' '+py;
    line+=(i===0?'M ':' L ')+px+' '+py;
  }
  area+=' L '+X(series.length-1).toFixed(1)+' '+plotY1.toFixed(1)+' Z';
  svg+='<path d="'+area+'" fill="rgba(var(--teal-rgb),.13)" stroke="none"/>';
  svg+='<path d="'+line+'" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // trend (dashed moving average)
  if(series.length>=3){
    var tl='';
    for(var t=0;t<series.length;t++){ tl+=(t===0?'M ':' L ')+X(t).toFixed(1)+' '+Y(trend[t]).toFixed(1); }
    svg+='<path d="'+tl+'" fill="none" stroke="var(--dim)" stroke-width="1.6" stroke-dasharray="5 4" stroke-linecap="round"/>';
  }
  // dots + x labels
  for(var k=0;k<series.length;k++){
    var cx=X(k), cy=Y(vals[k]);
    svg+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="3.2" fill="var(--teal)" stroke="var(--panel)" stroke-width="1.5"/>';
    // label every Nth to avoid crowding
    var everyN = series.length>18?3:(series.length>10?2:1);
    if(k%everyN===0 || k===series.length-1){
      svg+='<text x="'+cx.toFixed(1)+'" y="'+(H-9)+'" text-anchor="middle" font-size="9" fill="var(--dim)" font-family="var(--font)">'+esc(lbl(series[k].bucket,grouping))+'</text>';
    }
  }
  svg+='</svg>';
  chart.innerHTML='<div class="svgscroll">'+svg+'</div>';
  var sc=chart.querySelector('.svgscroll'); if(sc) sc.scrollLeft=sc.scrollWidth;
  extra.innerHTML='<div class="chartlegend"><span><i></i>focus</span><span><i class="trend"></i>trend ('+win+'-pt avg)</span></div>';
}

function renderRadar(chart){
  var d=DATA||{};
  var days=(d.byDayOfWeek||[]);
  if(!days.length || days.reduce(function(m,x){return m+(x.minutes||0);},0)===0){
    chart.innerHTML='<div class="empty">No sessions in this range yet.</div>'; return;
  }
  var n=days.length; // expected 7
  var max=days.reduce(function(m,x){return Math.max(m,x.minutes||0);},1);
  var W=320, H=240, cx=W/2, cy=H/2+4, R=88;
  var rings=4;
  function pt(i, r){
    var ang=-Math.PI/2 + i*(2*Math.PI/n);
    return { x: cx + r*Math.cos(ang), y: cy + r*Math.sin(ang) };
  }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" role="img" style="max-width:100%">';
  // concentric rings (polygons)
  for(var g=1; g<=rings; g++){
    var rr=R*g/rings, pts='';
    for(var i=0;i<n;i++){ var p=pt(i,rr); pts+=p.x.toFixed(1)+','+p.y.toFixed(1)+' '; }
    svg+='<polygon points="'+pts.trim()+'" fill="none" stroke="var(--line)" stroke-width="1"/>';
  }
  // spokes
  for(var s=0;s<n;s++){
    var e=pt(s,R);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+e.x.toFixed(1)+'" y2="'+e.y.toFixed(1)+'" stroke="var(--line)" stroke-width="1"/>';
  }
  // data polygon
  var dpts='';
  for(var j=0;j<n;j++){ var r=(days[j].minutes||0)/max*R; var q=pt(j,r); dpts+=q.x.toFixed(1)+','+q.y.toFixed(1)+' '; }
  svg+='<polygon points="'+dpts.trim()+'" fill="rgba(var(--teal-rgb),.22)" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round"/>';
  // vertices + labels
  for(var v=0;v<n;v++){
    var rv=(days[v].minutes||0)/max*R, qv=pt(v,rv);
    svg+='<circle cx="'+qv.x.toFixed(1)+'" cy="'+qv.y.toFixed(1)+'" r="3.4" fill="var(--teal)" stroke="var(--panel)" stroke-width="1.5"/>';
    var lp=pt(v, R+16);
    var anchor = Math.abs(lp.x-cx)<8 ? 'middle' : (lp.x<cx?'end':'start');
    svg+='<text x="'+lp.x.toFixed(1)+'" y="'+(lp.y+3).toFixed(1)+'" text-anchor="'+anchor+'" font-size="10" font-weight="600" fill="var(--dim)" font-family="var(--font)">'+esc(days[v].day)+'</text>';
  }
  svg+='</svg>';
  chart.innerHTML='<div class="radarwrap">'+svg+'</div>';
}

// ---- timeline ----
function renderTimeline(recent){
  var el=document.getElementById('timeline');
  if(!recent.length){ el.innerHTML='<div class="empty">No recent sessions yet.</div>'; return; }
  el.innerHTML=recent.map(function(s){
    var day=fmtDay(s.date), tm=fmtTime(s.start);
    var sm=srcMark(s.source);
    var noteHtml = s.note ? '<div class="note">'+esc(s.note)+'</div>' : '';
    return '<div class="item" data-day="'+esc(s.date)+'">'+
      '<div class="when"><div class="d">'+esc(day)+'</div>'+(tm?'<div class="t">'+esc(tm)+'</div>':'')+'</div>'+
      '<div class="body"><div class="line1"><span class="dur">'+fmtH(s.minutes)+'</span>'+(s.tag?'<span class="chip">'+esc(s.tag)+'</span>':'')+'</div>'+noteHtml+'</div>'+
      '<div class="src" title="'+esc(sm.l)+'"><span class="si">'+sm.i+'</span></div>'+
    '</div>';
  }).join('');
}

// ---- day drill-down ----
function openDay(date){
  if(!date) return;
  var ovl=document.getElementById('ovl'), sheet=document.getElementById('sheet');
  sheet.innerHTML='<div class="shead"><div><div class="stitle">'+esc(fmtDayFull(date))+'</div><div class="stotal">Loading…</div></div><button class="x" data-close="1" aria-label="Close">✕</button></div>';
  ovl.classList.add('open');
  fetch('/api/focus/day?date='+encodeURIComponent(date)).then(function(r){return r.json();}).then(function(d){
    var sessions=(d.sessions||[]).slice().sort(function(a,b){
      var ta=a.start?new Date(a.start).getTime():(a.ts||0);
      var tb=b.start?new Date(b.start).getTime():(b.ts||0);
      return ta-tb;
    });
    var total=(d.totalMinutes!=null)?d.totalMinutes:sessions.reduce(function(m,x){return m+(x.minutes||0);},0);
    var cnt=(d.count!=null?d.count:sessions.length);
    var head='<div class="shead"><div><div class="stitle">'+esc(fmtDayFull(date))+'</div><div class="stotal">'+fmtH(total)+' · '+cnt+' session'+(cnt===1?'':'s')+'</div></div><button class="x" data-close="1" aria-label="Close">✕</button></div>';
    var rows = sessions.length ? sessions.map(function(s){
      var tm=s.start?fmtTime(s.start):'';
      var sm=srcMark(s.source);
      return '<div class="ds"><div class="dt">'+(tm?esc(tm):'—')+'</div>'+
        '<div class="db"><div class="dl1"><span class="ddur">'+fmtH(s.minutes)+'</span>'+(s.tag?'<span class="chip">'+esc(s.tag)+'</span>':'')+'</div>'+
        (s.note?'<div class="dnote">'+esc(s.note)+'</div>':'')+
        '<div class="dsrc">'+sm.i+' logged via '+esc(sm.l)+'</div></div></div>';
    }).join('') : '<div class="empty">No sessions recorded on this day.</div>';
    sheet.innerHTML=head+rows;
  }).catch(function(){
    sheet.innerHTML='<div class="shead"><div class="stitle">'+esc(fmtDayFull(date))+'</div><button class="x" data-close="1" aria-label="Close">✕</button></div><div class="empty">Could not load this day.</div>';
  });
}
function closeDay(){ document.getElementById('ovl').classList.remove('open'); }

// ---- wiring ----
function load(){
  fetch('/api/focus?grouping='+grouping).then(function(r){return r.json();}).then(render).catch(function(){
    document.getElementById('sub').textContent='Could not load focus data.';
  });
}

document.getElementById('toggle').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return;
  grouping=b.dataset.g;
  [].forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('on', x===b); });
  load();
});
document.getElementById('ctype').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return;
  chartType=b.dataset.c;
  [].forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('on', x===b); });
  renderChart();
});
document.getElementById('chart').addEventListener('click', function(e){
  var bw=e.target.closest('.bw.tap'); if(bw && bw.dataset.day) openDay(bw.dataset.day);
});
document.getElementById('timeline').addEventListener('click', function(e){
  var it=e.target.closest('.item'); if(it && it.dataset.day) openDay(it.dataset.day);
});
document.getElementById('ovl').addEventListener('click', function(e){
  if(e.target.closest('[data-close]')) closeDay();
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDay(); });

var inp=document.getElementById('logIn');
inp.addEventListener('keydown', function(e){
  if(e.key!=='Enter' || !inp.value.trim()) return;
  var txt=inp.value.trim();
  fetch('/api/focus/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})})
    .then(function(r){return r.json();}).then(function(d){
      document.getElementById('logHint').textContent = d.ok ? d.spoken : (d.error||'Couldn’t read a session from that — try “focused 45 min on X”.');
      if(d.ok){ inp.value=''; load(); }
    }).catch(function(){ document.getElementById('logHint').textContent='Offline.'; });
});
load();
</script>
