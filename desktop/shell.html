<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Jarvis</title>
<style>
  :root{ --ink:#04070f; --panel:#0a141b; --line:#163a39; --teal:#39e0d0; --cream:#dfeef0; --dim:#5d7480; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; background:var(--ink); color:var(--cream); font-family:'Space Grotesk',system-ui,sans-serif; }
  body{ display:flex; flex-direction:column; }
  .nav{ display:flex; align-items:center; gap:10px; padding:9px 14px; background:linear-gradient(180deg,#07131a,#04070f); border-bottom:1px solid var(--line); }
  .brand{ font-family:'Silkscreen',monospace; letter-spacing:.3em; color:var(--teal); font-size:13px; text-shadow:0 0 12px rgba(57,224,208,.5); }
  .tab{ background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-family:inherit; }
  .tab:hover{ color:var(--cream); }
  .tab.on{ color:#04070f; background:var(--teal); border-color:var(--teal); font-weight:600; }
  .spacer{ flex:1; }
  .host{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); }
  .host input{ width:130px; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:6px; color:var(--cream); padding:4px 7px; font-size:11px; outline:none; }
  .host input:focus{ border-color:var(--teal); }
  webview{ flex:1; border:0; }
  .dot{ width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal); }
</style>
</head>
<body>
  <div class="nav">
    <span class="brand">JARVIS</span>
    <button class="tab on" data-surface="world">World</button>
    <button class="tab" data-surface="hq">HQ</button>
    <span class="spacer"></span>
    <span class="host">host <input id="host" spellcheck="false" /> <span class="dot" title="point at your NAS over Tailscale, or localhost"></span></span>
  </div>
  <webview id="view" allowpopups></webview>
<script>
  const PORTS = { world: 8095, hq: 8099 };
  const view = document.getElementById('view');
  const hostInput = document.getElementById('host');
  let host = localStorage.getItem('jarvis-host') || 'localhost';
  let surface = 'world';
  hostInput.value = host;
  const url = (s) => `http://${host}:${PORTS[s]}/`;
  function go(s){ surface = s; view.src = url(s); document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.surface === s)); }
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => go(t.dataset.surface)));
  hostInput.addEventListener('change', () => { host = hostInput.value.trim() || 'localhost'; localStorage.setItem('jarvis-host', host); go(surface); });
  go('world');
</script>
</body>
</html>
