<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🌳 Focus — Jarvis</title>
<script>try{var _t=localStorage.getItem('jarvis-theme');document.documentElement.dataset.theme=(!_t||_t==='exec')?'black':_t;}catch(e){document.documentElement.dataset.theme='black';}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ margin:0; background:var(--ink); color:var(--cream); font-family:var(--font,'Inter',system-ui,sans-serif); -webkit-font-smoothing:antialiased; letter-spacing:-.011em; }
  .wrap{ max-width:820px; margin:0 auto; padding:18px 16px calc(28px + env(safe-area-inset-bottom,0)); }
  .top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  h1{ font-size:22px; font-weight:800; margin:0; letter-spacing:-.01em; }
  .back{ font-size:13px; color:var(--teal); text-decoration:none; }
  .sub{ color:var(--dim); font-size:13px; margin:4px 0 16px; }
  .toggle{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .toggle button{ appearance:none; border:1px solid rgba(var(--teal-rgb),.25); background:transparent; color:var(--dim); border-radius:20px; padding:7px 15px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; }
  .toggle button.on{ background:var(--teal); color:var(--ink-on-accent); border-color:var(--teal); }
  .tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  @media(max-width:460px){ .tiles{ grid-template-columns:repeat(2,1fr); } }
  .tile{ background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:14px; padding:13px 14px; }
  .tile .v{ font-size:22px; font-weight:800; color:var(--teal); letter-spacing:-.02em; }
  .tile .k{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-top:3px; }
  .h2{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:22px 0 10px; }
  .chart{ display:flex; align-items:flex-end; gap:5px; height:220px; overflow-x:auto; padding-bottom:4px; scrollbar-width:thin; }
  .chart::-webkit-scrollbar{ height:5px; } .chart::-webkit-scrollbar-thumb{ background:var(--teal-dim); border-radius:5px; }
  .bw{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
  .bar{ width:20px; min-height:2px; background:linear-gradient(180deg,var(--teal),var(--teal-dim)); border-radius:5px 5px 0 0; transition:opacity .15s; }
  .bar:hover{ opacity:.75; }
  .bv{ font-size:9px; color:var(--dim); margin-bottom:3px; }
  .bl{ font-size:9px; color:var(--dim); margin-top:5px; white-space:nowrap; transform:rotate(-30deg); transform-origin:top center; height:22px; }
  .tags .row{ display:flex; align-items:center; gap:10px; margin:7px 0; font-size:13px; }
  .tags .name{ flex:0 0 128px; color:var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tags .track{ flex:1; height:16px; background:rgba(var(--teal-rgb),.08); border-radius:8px; overflow:hidden; }
  .tags .fill{ height:100%; background:var(--teal); border-radius:8px; }
  .tags .val{ flex:0 0 auto; color:var(--teal); font-weight:700; font-size:12px; width:56px; text-align:right; }
  .log{ margin-top:24px; background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:14px; padding:14px; }
  .log input{ width:100%; box-sizing:border-box; background:var(--ink2); border:1px solid rgba(var(--teal-rgb),.25); border-radius:10px; color:var(--cream); padding:12px 14px; font:inherit; font-size:15px; }
  .log .hint{ font-size:12px; color:var(--dim); margin-top:8px; }
  .empty{ color:var(--dim); font-size:13px; padding:20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>🌳 Focus</h1><a class="back" href="/">‹ Jarvis</a></div>
  <div class="sub" id="sub">Loading your time…</div>

  <div class="toggle" id="toggle">
    <button data-g="day">Day</button>
    <button data-g="week">Week</button>
    <button data-g="month" class="on">Month</button>
    <button data-g="quarter">Quarter</button>
    <button data-g="year">Year</button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="h2">Focus over time</div>
  <div class="chart" id="chart"></div>

  <div class="h2">Where the time goes</div>
  <div class="tags" id="tags"></div>

  <div class="log">
    <input id="logIn" placeholder="Log a session — e.g. “focused 90 minutes on gov proposals”" autocomplete="off">
    <div class="hint" id="logHint">Type it or just tell Jarvis by voice. Enter to log.</div>
  </div>
</div>

<script>
var grouping = 'month';
function fmtH(mins){ var h=mins/60; return (Math.round(h*10)/10)+'h'; }
function lbl(b, g){
  if(g==='year') return b;
  if(g==='month'){ var p=b.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1]+" '"+p[0].slice(2); }
  if(g==='quarter') return b.replace('-',' ');
  if(g==='week') return b.split('-W')[1] ? "W"+b.split('-W')[1] : b;
  return b.slice(5); // day → MM-DD
}
var MAXBARS = { day:45, week:30, month:36, quarter:24, year:20 };
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function render(d){
  document.getElementById('sub').textContent = d.totalHours + ' hours · ' + d.sessions.toLocaleString() + ' sessions · ' + d.activeDays.toLocaleString() + ' active days' + (d.error?(' · '+d.error):'');
  var tiles=[['v',d.totalHours+'h','Total focus'],['v',d.sessions.toLocaleString(),'Sessions'],['v',d.streak,'Day streak'],['v',d.activeDays.toLocaleString(),'Active days'],['v',d.successRate+'%','Completed'],['v',d.bestDayOfWeek||'—','Best day']];
  document.getElementById('tiles').innerHTML = tiles.map(function(t){return '<div class="tile"><div class="v">'+esc(t[1])+'</div><div class="k">'+esc(t[2])+'</div></div>';}).join('');

  var series = (d.series||[]).slice(-MAXBARS[grouping]);
  var max = series.reduce(function(m,s){return Math.max(m,s.minutes);},1);
  var chart=document.getElementById('chart');
  chart.innerHTML = series.length ? series.map(function(s){
    var pct=Math.max(2,Math.round(s.minutes/max*100));
    return '<div class="bw"><div class="bv">'+fmtH(s.minutes)+'</div><div class="bar" style="height:'+pct+'%" title="'+esc(s.bucket)+': '+fmtH(s.minutes)+'"></div><div class="bl">'+esc(lbl(s.bucket,grouping))+'</div></div>';
  }).join('') : '<div class="empty">No sessions in this range yet.</div>';
  chart.scrollLeft = chart.scrollWidth;

  var tags=(d.topTags||[]); var tmax=tags.reduce(function(m,t){return Math.max(m,t.minutes);},1);
  document.getElementById('tags').innerHTML = tags.length ? tags.map(function(t){
    return '<div class="row"><div class="name">'+esc(t.tag)+'</div><div class="track"><div class="fill" style="width:'+Math.round(t.minutes/tmax*100)+'%"></div></div><div class="val">'+fmtH(t.minutes)+'</div></div>';
  }).join('') : '<div class="empty">—</div>';
}

function load(){
  fetch('/api/focus?grouping='+grouping).then(function(r){return r.json();}).then(render).catch(function(){
    document.getElementById('sub').textContent='Could not load focus data.';
  });
}
document.getElementById('toggle').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return;
  grouping=b.dataset.g;
  [].forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('on', x===b); });
  load();
});
var inp=document.getElementById('logIn');
inp.addEventListener('keydown', function(e){
  if(e.key!=='Enter' || !inp.value.trim()) return;
  var txt=inp.value.trim();
  fetch('/api/focus/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})})
    .then(function(r){return r.json();}).then(function(d){
      document.getElementById('logHint').textContent = d.ok ? d.spoken : (d.error||'Couldn’t read a session from that — try “focused 45 min on X”.');
      if(d.ok){ inp.value=''; load(); }
    }).catch(function(){ document.getElementById('logHint').textContent='Offline.'; });
});
load();
</script>
</body>
</html>
