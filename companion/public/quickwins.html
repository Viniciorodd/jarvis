<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>⚡ Quick Wins — Jarvis</title>
<script>try{var _t=localStorage.getItem('jarvis-theme');document.documentElement.dataset.theme=(!_t||_t==='exec')?'black':_t;}catch(e){document.documentElement.dataset.theme='black';}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ margin:0; background:var(--ink); color:var(--cream); font-family:var(--font,'Inter',system-ui,sans-serif); -webkit-font-smoothing:antialiased; letter-spacing:-.011em; }
  .wrap{ max-width:920px; margin:0 auto; padding:18px 16px calc(28px + env(safe-area-inset-bottom,0)); }
  .top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  h1{ font-size:22px; font-weight:800; margin:0; letter-spacing:-.01em; }
  .back{ font-size:13px; color:var(--teal); text-decoration:none; }
  .sub{ color:var(--dim); font-size:13px; margin:4px 0 14px; }
  .bar{ display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .bar select,.bar button{ appearance:none; border:1px solid rgba(var(--teal-rgb),.28); background:transparent; color:var(--cream); border-radius:9px; padding:8px 13px; font:inherit; font-size:13px; cursor:pointer; }
  .bar button.go{ background:var(--teal); color:var(--ink-on-accent); border-color:var(--teal); font-weight:700; }
  .card{ background:var(--panel); border:1px solid rgba(var(--teal-rgb),.14); border-radius:14px; padding:14px 16px; margin-bottom:11px; }
  .card .r1{ display:flex; align-items:flex-start; gap:10px; }
  .score{ flex:0 0 auto; width:34px; height:34px; border-radius:9px; background:rgba(var(--teal-rgb),.14); color:var(--teal); font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .ttl{ font-size:15.5px; font-weight:600; line-height:1.3; }
  .agency{ font-size:12px; color:var(--dim); margin-top:2px; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; margin:9px 0 4px; }
  .tag{ font-size:10.5px; letter-spacing:.04em; text-transform:uppercase; color:var(--dim); border:1px solid rgba(var(--teal-rgb),.2); border-radius:20px; padding:3px 9px; }
  .tag.ss{ color:var(--teal); border-color:rgba(var(--teal-rgb),.4); }
  .tag.one{ color:#e0b64a; border-color:rgba(224,182,74,.4); }
  .why{ font-size:12.5px; color:var(--dim); margin-top:6px; }
  .acts{ display:flex; gap:8px; margin-top:11px; flex-wrap:wrap; }
  .acts a{ font-size:12.5px; text-decoration:none; border-radius:8px; padding:7px 12px; border:1px solid rgba(var(--teal-rgb),.28); color:var(--cream); }
  .acts a.primary{ background:var(--teal); color:var(--ink-on-accent); border-color:var(--teal); font-weight:600; }
  .due{ font-size:12px; color:var(--dim); margin-left:auto; align-self:center; }
  .empty{ color:var(--dim); font-size:14px; padding:30px 0; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>⚡ Quick Wins</h1><a class="back" href="/">‹ Jarvis</a></div>
  <div class="sub">One-off, in-lane jobs the main scout misses — cleaning, grounds, hauling, pressure-wash, the fun random stuff. Screened to your lane; traps (base-ops, O&amp;M, clearance) filtered out.</div>

  <div class="bar">
    <label style="font-size:13px;color:var(--dim)">Posted in the last</label>
    <select id="days"><option value="3">3 days</option><option value="7" selected>7 days</option><option value="14">14 days</option><option value="30">30 days</option></select>
    <button class="go" id="scan">Scan SAM.gov</button>
    <a href="/capability" target="_blank" style="margin-left:auto;font-size:12.5px;color:var(--teal);text-decoration:none">📄 Capability statement</a>
  </div>

  <div id="list"><div class="empty">Tap “Scan SAM.gov” to find quick wins.</div></div>
</div>

<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function fmtDue(d){ if(!d) return ''; try{ var dt=new Date(d); if(isNaN(dt)) return d; var days=Math.ceil((dt-new Date())/86400000); return (days>=0?days+'d left':'closed')+' · '+dt.toLocaleDateString(); }catch(e){ return d; } }
function card(l){
  var tags=[];
  if(l.sourcesSought) tags.push('<span class="tag ss">sources-sought</span>');
  if(l.oneTime) tags.push('<span class="tag one">one-time</span>');
  tags.push('<span class="tag">NAICS '+esc(l.naics)+'</span>');
  if(l.setAside && l.setAside!=='none stated') tags.push('<span class="tag">'+esc(l.setAside)+'</span>');
  return '<div class="card"><div class="r1"><div class="score">'+esc(l.score)+'</div><div style="flex:1">'
    +'<div class="ttl">'+esc(l.title)+'</div><div class="agency">'+esc(l.agency)+'</div></div>'
    +'<div class="due">'+esc(fmtDue(l.due))+'</div></div>'
    +'<div class="tags">'+tags.join('')+'</div>'
    +'<div class="why">'+esc(l.why)+'</div>'
    +'<div class="acts">'+(l.link?'<a class="primary" href="'+esc(l.link)+'" target="_blank" rel="noreferrer">Open on SAM.gov ↗</a>':'')
    +'<a href="/capability" target="_blank">📄 Attach capability PDF</a></div></div>';
}
function scan(){
  var days=document.getElementById('days').value;
  var list=document.getElementById('list');
  list.innerHTML='<div class="empty">Scanning SAM.gov across your lane…</div>';
  fetch('/api/gov/quickwins?days='+days).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){ list.innerHTML='<div class="empty">'+(d.error==='no SAM_API_KEY'?'SAM API key not set — add SAM_API_KEY to .env.':'Could not scan: '+esc(d.error||'unknown'))+'</div>'; return; }
    if(!d.leads||!d.leads.length){ list.innerHTML='<div class="empty">No quick wins in this window. Widen the days or check back tomorrow.</div>'; return; }
    document.querySelector('.sub').textContent = d.count+' quick win'+(d.count===1?'':'s')+' found in your lane — ranked by fit.';
    list.innerHTML=d.leads.map(card).join('');
  }).catch(function(){ list.innerHTML='<div class="empty">Offline or the scan failed.</div>'; });
}
document.getElementById('scan').addEventListener('click',scan);
scan();
</script>
</body>
</html>
