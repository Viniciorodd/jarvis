<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- JARVIS app icon — teal arc reactor on pure black (matches the 2026 rebrand: accent #43e6d4 on #000). -->
  <defs>
    <radialGradient id="jGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#43e6d4" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#43e6d4" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#43e6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jCore" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#e8fffb"/>
      <stop offset="45%" stop-color="#5cf0df"/>
      <stop offset="100%" stop-color="#2bbfb0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#000000"/>

  <!-- ambient glow -->
  <circle cx="256" cy="256" r="205" fill="url(#jGlow)"/>

  <!-- outer hairline ring -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#43e6d4" stroke-width="5" opacity="0.26"/>

  <!-- segmented coil ring (the arc-reactor look) -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="#43e6d4" stroke-width="16"
          stroke-linecap="round" opacity="0.85" stroke-dasharray="30 42.3"/>

  <!-- inner ring -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="#5cf0df" stroke-width="9" opacity="0.9"/>

  <!-- bright core -->
  <circle cx="256" cy="256" r="58" fill="url(#jCore)"/>
  <circle cx="256" cy="256" r="58" fill="none" stroke="#e8fffb" stroke-width="2" opacity="0.5"/>
</svg>
