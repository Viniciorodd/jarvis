server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: every non-asset path serves the app shell so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin proxies — the PWA calls /hq/... and /cp/..., nginx forwards to the services by their
  # compose name. Reachable only over Tailscale; nothing here is exposed to the public internet.
  location /hq/ {
    proxy_pass http://hq:8099/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
  }
  location /cp/ {
    proxy_pass http://control-plane:8787/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
  }
}
