# JARVIS stack — runs on the UGREEN NAS (UGOS Pro → Docker → Compose).
# See docs/nas-setup.md for the step-by-step. All services reachable only
# over Tailscale; do NOT port-forward any of this to the internet.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST}:5678/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      # Let workflows read these via {{ $env.X }} expressions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SAM_API_KEY: ${SAM_API_KEY}
      HQ_URL: ${HQ_URL}
      HQ_TOKEN: ${HQ_TOKEN}
    volumes:
      - ./volumes/n8n:/home/node/.n8n
      # Drop voice memos here (synced folder / SMB share) for the Whisper pipeline
      - ./volumes/voice-inbox:/data/voice-inbox

  hq:
    build: ./hq
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      HQ_PORT: 8099
      HQ_TOKEN: ${HQ_TOKEN}
      DATA_DIR: /data
    volumes:
      - ./volumes/hq:/data

  # Local, private voice transcription. POST multipart audio_file → /asr?output=json
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: small        # N100-class NAS CPUs handle "small" fine; use "base" if slow
      ASR_ENGINE: faster_whisper
    volumes:
      - ./volumes/whisper-cache:/root/.cache

  # Tailscale as a container (host networking). This brings the tailnet interface
  # up ON the host, so the published container ports above (5678, 8099, 9000) become
  # reachable across your tailnet at  http://<hostname>:<port>  — nothing public.
  # ALTERNATIVE: install Tailscale from the UGREEN App Center instead and skip this
  # service entirely. Pick ONE. See docs/nas-setup.md.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: jarvis-tailscale
    hostname: jarvis-nas              # becomes the MagicDNS name → http://jarvis-nas:8099
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # --accept-dns=false avoids the known UGOS port-53 / DNS fight (plan §11)
      TS_EXTRA_ARGS: "--accept-dns=false"
    volumes:
      - ./volumes/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
